services:
  gilito:
    image: gilito:latest
    container_name: gilito
    restart: unless-stopped
    volumes:
      - /home/tofu/docker/gilito/data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/gilito.db
      - AI_API_KEY=${AI_API_KEY}
      - AI_ENDPOINT=${AI_ENDPOINT}
      - AI_MODEL=${AI_MODEL:-gemini-2.0-flash-lite}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - gilito

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-gilito
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - gilito

networks:
  gilito:
    driver: bridge
